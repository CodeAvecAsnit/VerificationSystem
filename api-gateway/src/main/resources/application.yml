spring:
  application:
    name: app-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: google-auth-init
          uri: http://localhost:8081
          predicates:
            - Path=/oauth2/authorization/google

        - id: website-test
          uri: http://localhost:5500
          predicates:
            - Path=/

server:
  port: 6776